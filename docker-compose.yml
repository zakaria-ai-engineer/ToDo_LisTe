# ═══════════════════════════════════════════════════════════════════════════════
# docker-compose.yml — TaskBot AI (Production-Ready)
# Lancement : docker-compose up --build
# ═══════════════════════════════════════════════════════════════════════════════

version: "3.9"

# ── Réseau partagé ────────────────────────────────────────────────────────────
networks:
  taskbot_network:
    driver: bridge

# ── Volume persistant MongoDB ─────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local

# ══════════════════════════════════════════════════════════════════════════════
services:

  # ── 1. MongoDB ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: taskbot_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      # Volume persistant : les données survivent aux redémarrages
      - mongo_data:/data/db
    networks:
      - taskbot_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 2. Backend FastAPI ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskbot_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # ⚠️  Remplace par ta vraie clé avant de lancer
      - GEMINI_API_KEY=${GEMINI_API_KEY:-ta_cle_gemini_ici}
      # Le backend appelle MongoDB par son nom de service Docker, pas localhost
      - MONGODB_URL=mongodb://mongodb:27017/
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-95cc66a0e21acda2583599ebfa7b9269971f4d54d687b210e17a75bee1d78b42}
      - ALGORITHM=HS256
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taskbot_network
    healthcheck:
      test: ["CMD", "curl", "-f", "https://todo-199jiuq4.b4a.run/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 3. Frontend React (Vite) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskbot_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      # URL de l'API backend (accessible depuis le navigateur, donc localhost)
      - VITE_API_URL=https://todo-199jiuq4.b4a.run
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - taskbot_network
